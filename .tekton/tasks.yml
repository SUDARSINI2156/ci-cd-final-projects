apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-tests
spec:
  steps:
    - name: run-tests
      image: python:3.9
      script: |
        #!/bin/bash
        pip install nose
        nosetests

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine:3.18
      script: |
        #!/bin/sh
        echo "Cleaning up workspace"
        rm -rf /workspace/*
